<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Records Using Blockchain</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <br>
    <h1>Hospital Records Using Block chain</h1>
    <div class="image">
        <img src="./images/hsptl.avif" alt="image">
    </div>
    <div class="card">
        <form id="patientForm">
            <label>Patient Name:</label>
            <input type="text" id="patientName">
            <label>Patient Age:</label>
            <input type="number" id="patientAge">
            <label>Patient Description:</label>
            <input type="text" id="patientDescription">
            <label>Patient UID:</label>
            <input type="number" id="patientUID"><br>
            <button type="submit" id="addRecordBtn" >Add Record</button>
        </form>
    </div>
    
    <div class="card">
        <form id="patientRecords">
            <label>UID:</label>
            <input type="number" id="getUID"><br>
            <button type="submit" id="getDetailsBtn">Get Records</button>
        </form>
    </div>
    
    <div class="card">
        <a href="allRecords.html">
            <button type="button" id="getAllRecords" onclick="populateAllRecords()">View all Blockchain</button>
        </a>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
