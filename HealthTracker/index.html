<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Records using Blockchain</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <br>
    <h1>Hospital records using Block chain</h1>
    <div class="image">
        <img src="/HealthTracker/images/hsptl.avif" alt="image">
    </div>
    <div class="card">
        <form id="patientForm">
            <label>Patient Name:</label>
            <input type="text" id="patientName">
            <label>Patient Age:</label>
            <input type="number" id="patientAge">
            <label>Patient Description:</label>
            <input type="text" id="patientDescription">
            <label>Patient UID:</label>
            <input type="number" id="patientUID"><br>
            <button type="button" onclick="addRecord()">Add Record</button>
        </form>
    </div>
    <div class="card">
        <form id="patientRecords">
            <lable>UID:</lable>
            <input type="number" id="patientUID"><br>
            <a href="patientRecords.html" class="button-class">
                <button type="button">Get Records</button>
            </a>
        </form>
    </div>
    <div class="card">
        <a href="allRecords.html">
            <button type="button" >View all Blockchain</button>
        </a>
    </div>
    <script src="script.js"></script>
</body>
</html>
